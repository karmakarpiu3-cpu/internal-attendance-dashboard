<!DOCTYPE html>
<html>
<head>
    <title>Login System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #333;
        }

        .error {
            color: red;
            text-align: center;
        }

        .note {
            font-size: 13px;
            background: #eef6ff;
            padding: 10px;
            border-left: 4px solid #007bff;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Login System</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <div class="note">
        Select your role and login to continue
    </div>

    <form method="POST">

        <!-- ROLE -->
        <label>Role</label>
        <select name="role" required>
            <option value="">-- Select Role --</option>
            <option value="Admin">Admin</option>
            <option value="Intern">Intern</option>
            <option value="Contributor">Contributor</option>
            <option value="Team Member">Team Member</option>
        </select>

        <!-- USERNAME -->
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>

        <!-- PASSWORD -->
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
